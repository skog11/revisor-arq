name: Normative Alerts

on:
  schedule:
    - cron: '0 8 * * 1' # Todos los lunes a las 8 AM
  workflow_dispatch:   # Permitir ejecución manual

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm install

      - name: Run BCN Scraper
        run: cd app && npx tsx scripts/alerts/check-bcn.ts
        
      - name: Commit state changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/scripts/alerts/state.json
          git commit -m "chore: update normative state" || echo "No changes to commit"
          git push
